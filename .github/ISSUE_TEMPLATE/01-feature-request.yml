name: 🚀 Feature Request
description: Propose a new feature or enhancement for dotfiler
title: "[FEATURE]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new feature? Awesome! Keep it simple - we can work out the details together.

  - type: textarea
    id: what-you-want
    attributes:
      label: What feature do you want?
      description: Describe the feature or enhancement you'd like to see
      placeholder: |
        Examples:
        - "A command to quickly switch between different git configurations"
        - "Better organization of shell functions by category" 
        - "Auto-backup of dotfiles before making changes"
        - "Support for fish shell"
    validations:
      required: true

  - type: textarea
    id: why-you-want-it
    attributes:
      label: Why do you want this?
      description: What problem would this solve or what workflow would it improve?
      placeholder: This would help me because...
    validations:
      required: true

  - type: textarea
    id: how-it-should-work
    attributes:
      label: How should it work?
      description: Describe your ideal solution (high-level is fine)
      placeholder: |
        I imagine it would work like:
        1. User does X
        2. System responds with Y
        3. Result is Z
        
        Or any ideas you have about implementation...
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: What area is this for? (optional)
      description: Choose the closest match
      default: 0
      options:
        - I'm not sure
        - Shell setup (aliases, functions, environment)
        - Installation and setup process
        - Scripts and command-line tools
        - Package management
        - Documentation and help
        - Other

  - type: checkboxes
    id: environment
    attributes:
      label: Environment (optional)
      description: What should this work with?
      options:
        - label: macOS
          checked: true
        - label: Linux
        - label: zsh
          checked: true
        - label: bash
        - label: All shells/platforms

  - type: textarea
    id: additional-context
    attributes:
      label: Anything else?
      description: Examples, links, related issues, etc.
      placeholder: |
        - Examples from other tools
        - Related issues: #123
        - Screenshots or mockups
        - Any other helpful context

  - type: checkboxes
    id: simple-checklist
    attributes:
      label: Quick check
      options:
        - label: I've looked for this feature in existing issues
          required: true