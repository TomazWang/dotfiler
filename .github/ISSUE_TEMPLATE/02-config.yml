name: ⚙️ Configuration
description: Add or modify dotfile configurations, aliases, functions, or environment settings
title: "[CONFIG]: "
labels: ["configuration", "dotfiles", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Quick and simple way to add or modify configurations. Don't worry if you're not sure about technical details - we'll help figure it out!

  - type: textarea
    id: what-you-want
    attributes:
      label: What do you want to configure?
      description: Describe what you want to add or change
      placeholder: |
        Examples:
        - "I want an alias for 'ls -la'"
        - "I need my git to use a different editor"
        - "I want to add a shortcut for docker commands"
        - "I have a custom prompt I want to use"
    validations:
      required: true

  - type: textarea
    id: config-content
    attributes:
      label: Configuration (if you have it)
      description: Paste your config here, or just describe what you want
      placeholder: |
        If you have the actual config:
        alias ll="ls -la"
        export EDITOR="code"
        
        Or just describe:
        "I want a shortcut for listing files with details"
      render: shell

  - type: textarea
    id: why-you-want-it
    attributes:
      label: Why do you want this?
      description: What problem does this solve or what workflow does it improve?
      placeholder: This would help me because...
    validations:
      required: true

  - type: dropdown
    id: config-type
    attributes:
      label: What type of config is this? (optional)
      description: Choose the closest match, or skip if unsure
      default: 0
      options:
        - I'm not sure
        - Alias or shortcut command
        - Environment variable or setting
        - Shell function or script
        - Application config file (git, tmux, etc.)
        - Package or tool to install
        - Other

  - type: checkboxes
    id: environment
    attributes:
      label: Environment (optional)
      description: Check what applies (we'll assume macOS + zsh if unsure)
      options:
        - label: macOS
        - label: Linux
        - label: zsh
        - label: bash
        - label: All shells (zsh, bash, fish, etc.)
        - label: I need this to work everywhere

  - type: textarea
    id: additional-info
    attributes:
      label: Anything else?
      description: Dependencies, conflicts, links, examples, etc.
      placeholder: Optional - any other details that might be helpful...

  - type: checkboxes
    id: simple-checklist
    attributes:
      label: Quick check
      options:
        - label: I've looked for this config in existing issues
          required: true