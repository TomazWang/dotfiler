name: ⚙️ Configuration
description: Add or modify dotfile configurations, aliases, functions, or environment settings
title: "[CONFIG]: "
labels: ["configuration", "dotfiles", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for adding new configurations or modifying existing ones. This includes dotfiles, shell configs, aliases, functions, and environment settings.

  - type: textarea
    id: config-description
    attributes:
      label: Configuration Description
      description: Describe the configuration you want to add or modify
      placeholder: A clear description of what configuration needs to be added/changed...
    validations:
      required: true

  - type: dropdown
    id: config-type
    attributes:
      label: Configuration Type
      description: What type of configuration is this?
      options:
        - Shell Configuration (aliases, exports, prompt)
        - Shell Functions (custom commands, utilities)
        - Application Dotfiles (git, vim, tmux, etc.)
        - Environment Files (nvmrc, python-version, etc.)
        - Package/Tool Configuration (Brewfile, tool-specific configs)
        - Terminal/Shell Theme Configuration
        - Other
    validations:
      required: true

  - type: dropdown
    id: config-location
    attributes:
      label: Target Location
      description: Where should this configuration be placed?
      options:
        - "dotfiles/ (symlinked to home directory)"
        - "shell/configs/ (sourced by load.sh)"
        - "shell/functions/ (function definitions)"
        - "packages/ (dependency management)"
        - "New location (specify in details)"
        - "Modify existing file"
        - "Not sure (needs guidance)"
    validations:
      required: true

  - type: textarea
    id: config-content
    attributes:
      label: Configuration Content
      description: Provide the actual configuration content or settings
      placeholder: |
        # Paste your configuration here
        # For example:
        alias ll="ls -la"
        export EDITOR="vim"
        # or describe the settings you want
      render: shell
    validations:
      required: true

  - type: dropdown
    id: config-source
    attributes:
      label: Configuration Source
      description: Where did you get this configuration?
      options:
        - Personal workflow/preference
        - Tool documentation/recommendation
        - Community best practice
        - Migrating from existing setup
        - Other dotfiles repository
        - Online tutorial/guide
        - Work/team requirement
    validations:
      required: true

  - type: checkboxes
    id: portability
    attributes:
      label: Portability Requirements
      description: Which platforms should this config support?
      options:
        - label: macOS
        - label: Linux (Ubuntu/Debian)
        - label: Linux (CentOS/RHEL)
        - label: Other Unix systems
        - label: Cross-platform compatibility required

  - type: checkboxes
    id: shell-compatibility
    attributes:
      label: Shell Compatibility
      description: Which shells should this config work with?
      options:
        - label: zsh (primary)
        - label: bash
        - label: fish
        - label: Shell-agnostic
        - label: Not applicable

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies & Requirements
      description: Does this config require new packages, tools, or other dependencies?
      placeholder: |
        - Requires: brew install tool-name
        - Depends on: existing function xyz
        - Needs: environment variable ABC
        - etc.

  - type: textarea
    id: existing-conflicts
    attributes:
      label: Existing Configuration Impact
      description: Will this replace, modify, or conflict with existing configurations?
      placeholder: |
        - Replaces: current alias for 'ls'
        - Modifies: shell/configs/exports.sh
        - Conflicts with: existing .gitconfig
        - Adds to: shell/functions/

  - type: textarea
    id: testing-verification
    attributes:
      label: Testing & Verification
      description: How should we test that this configuration works correctly?
      placeholder: |
        - Test command: run 'alias' to verify
        - Check behavior: ls should show colors
        - Verify file: ~/.gitconfig contains new settings
        - Cross-platform: test on macOS and Linux
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case / Benefits
      description: Why is this configuration useful? What problem does it solve?
      placeholder: Explain the benefits and use cases for this configuration...
    validations:
      required: true

  - type: textarea
    id: documentation-needs
    attributes:
      label: Documentation Updates
      description: What documentation needs to be updated?
      placeholder: |
        - Update README.md with new feature
        - Add to shell help (shelp)
        - Document in CLAUDE.md
        - No documentation needed

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other relevant information?
      placeholder: |
        - Screenshots of behavior
        - Links to documentation
        - Examples from other dotfiles
        - Configuration history/background

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have tested this configuration in my local environment
          required: true
        - label: This configuration follows dotfiler's zero-magic philosophy
          required: true
        - label: I have considered cross-platform compatibility
          required: true
        - label: I have checked for conflicts with existing configurations
          required: true