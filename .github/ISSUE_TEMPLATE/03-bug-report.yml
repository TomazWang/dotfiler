name: 🐛 Bug Report
description: Report a bug, error, or unexpected behavior in dotfiler
title: "[BUG]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Found a bug? Let's get it fixed! Keep it simple - we'll ask for more details if needed.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem in your own words
      placeholder: |
        Example: "When I run install.sh, I get an error about missing files"
        or "My aliases don't work after sourcing the shell"
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: How can we reproduce this?
      description: Simple steps to make the bug happen again
      placeholder: |
        1. I ran this command: ...
        2. Then I did: ...
        3. And this happened: ...
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: What should have happened instead?
      description: Tell us what you expected to happen
      placeholder: I expected... but instead...
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: How bad is it? (optional)
      description: Help us prioritize
      options:
        - Not sure
        - Low (minor inconvenience)
        - Medium (impacts workflow)
        - High (major functionality broken)
        - Critical (prevents any work)

  - type: textarea
    id: environment
    attributes:
      label: Environment (optional)
      description: Your setup details (we'll assume macOS + zsh if blank)
      placeholder: |
        OS: macOS 14.1, Ubuntu 22.04, etc.
        Shell: zsh 5.9, bash 5.1, etc.
        Terminal: iTerm2, Terminal.app, etc.

  - type: textarea
    id: additional-info
    attributes:
      label: Anything else?
      description: Error messages, screenshots, workarounds you tried, etc.
      placeholder: |
        Error output:
        $ command that failed
        error: something went wrong
        
        Or any other helpful details...
      render: shell

  - type: checkboxes
    id: simple-checklist
    attributes:
      label: Quick check
      options:
        - label: I've looked for this bug in existing issues
          required: true