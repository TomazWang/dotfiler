name: 🐛 Bug Report
description: Report a bug, error, or unexpected behavior in dotfiler
title: "[BUG]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide detailed information to help us reproduce and fix the issue.

  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe what happened and what you expected instead...
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior
      placeholder: |
        1. Run command '...'
        2. Edit file '...'
        3. Execute '...'
        4. See error
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: A clear description of what you expected...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: A clear description of what actually happened...
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical (dotfiler completely broken)
        - High (major feature broken)
        - Medium (feature partially working)
        - Low (minor inconvenience)
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which area is affected?
      options:
        - Installation (install.sh, symlinks)
        - Shell Loading (load.sh, sourcing)
        - Functions & Aliases (shell/functions, shell/configs)
        - Scripts & Tools (shell/scripts, bin/)
        - Package Management (Brewfile, dependencies)
        - Environment Detection (PATH, auto-detection)
        - Other
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Messages / Logs
      description: Copy any error messages, stack traces, or relevant output
      placeholder: Paste error messages here...
      render: shell

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which OS are you using?
      options:
        - macOS Sonoma (14.x)
        - macOS Ventura (13.x)
        - macOS Monterey (12.x)
        - macOS Big Sur (11.x)
        - macOS Catalina (10.15)
        - Linux (Ubuntu)
        - Linux (CentOS/RHEL)
        - Linux (Debian)
        - Linux (Other)
        - Other
    validations:
      required: true

  - type: input
    id: shell-version
    attributes:
      label: Shell Version
      description: What shell and version are you using?
      placeholder: "zsh 5.9, bash 5.1, etc."
    validations:
      required: true

  - type: input
    id: dotfiler-version
    attributes:
      label: Dotfiler Version / Commit
      description: Which version or commit hash of dotfiler?
      placeholder: "Latest main, commit hash, or release tag"
    validations:
      required: true

  - type: textarea
    id: installation-method
    attributes:
      label: Installation Details
      description: How did you install dotfiler?
      placeholder: "Git clone, download zip, location where installed..."
    validations:
      required: true

  - type: textarea
    id: workarounds
    attributes:
      label: Workarounds Attempted
      description: Have you tried any workarounds? What were the results?
      placeholder: Describe any workarounds you've tried...

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context about the problem
      placeholder: |
        - Screenshots
        - Relevant configuration files
        - Terminal output
        - Related issues
        - Environment details

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to ensure this bug hasn't been reported
          required: true
        - label: I have provided all requested information above
          required: true
        - label: I can reproduce this bug consistently
          required: true