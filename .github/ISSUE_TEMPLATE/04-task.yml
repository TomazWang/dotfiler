name: 📋 Task / Maintenance
description: General project tasks, maintenance, refactoring, or improvements
title: "[TASK]: "
labels: ["task", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea for improving the project? Keep it simple - we can figure out the details together!

  - type: textarea
    id: what-needs-doing
    attributes:
      label: What needs to be done?
      description: Describe the task or improvement
      placeholder: |
        Examples:
        - "Clean up old functions that aren't used anymore"
        - "Add better error messages to install.sh"
        - "Update documentation for the new shell functions"
        - "Reorganize the shell/configs directory"
    validations:
      required: true

  - type: textarea
    id: why-its-needed
    attributes:
      label: Why is this needed?
      description: What problem does this solve or what would it improve?
      placeholder: This would help because...

  - type: textarea
    id: how-to-know-its-done
    attributes:
      label: How will we know it's done?
      description: What should be different when this is complete?
      placeholder: |
        When this is finished:
        - [ ] Thing 1 should work
        - [ ] Thing 2 should be updated
        - [ ] Users should be able to...
    validations:
      required: true

  - type: dropdown
    id: task-type
    attributes:
      label: What kind of task? (optional)
      description: Choose the closest match
      default: 0
      options:
        - Not sure/Other
        - Documentation
        - Testing/QA
        - Performance/Security
        - Tooling/Automation
        - Research

  - type: textarea
    id: additional-details
    attributes:
      label: Additional details (optional)
      description: Anything else that might be helpful
      placeholder: |
        - Files or areas that might be affected
        - Dependencies or related issues
        - Ideas for how to approach this
        - Potential risks or concerns

  - type: checkboxes
    id: simple-checklist
    attributes:
      label: Quick check
      options:
        - label: I've checked if this task exists in other issues
          required: true