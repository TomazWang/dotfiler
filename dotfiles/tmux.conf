# Tmux Configuration
# Managed by dotfiler

# ============================================================================
# Basic Settings
# ============================================================================

# Use 256 color terminal
set -g default-terminal "screen-256color"

# Increase scrollback buffer size
set -g history-limit 50000

# Display tmux messages for 4 seconds
set -g display-time 4000

# Refresh status line more often
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# ============================================================================
# Key Bindings
# ============================================================================

# Change prefix from Ctrl-b to Ctrl-a (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload tmux config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using prefix + arrow keys (recommended)
bind Left select-pane -L
bind Right select-pane -R
bind Up select-pane -U
bind Down select-pane -D

# Also support Alt-arrow without prefix (Alt-Left/Right won't work due to shell word navigation)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# ============================================================================
# Mouse Support & Clipboard Sharing
# ============================================================================

# Enable mouse mode (tmux 2.1 and above)
# This allows:
# - Clicking to select panes
# - Scrolling with mouse wheel
# - Dragging to resize panes
# - Selecting text with mouse
set -g mouse on

# ============================================================================
# Copy Mode & Clipboard Integration
# ============================================================================

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Copy to system clipboard (macOS)
# When you select text in copy mode, it will be copied to system clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste from system clipboard
bind-key p run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Enter copy mode with prefix + [
# Or with mouse wheel scroll (automatically enters copy mode)

# ============================================================================
# Status Bar
# ============================================================================

# Status bar styling
set -g status-style 'bg=colour235 fg=colour255'
set -g status-left-length 40
set -g status-left '#[fg=colour255,bg=colour238] #S #[default] '
set -g status-right '#[fg=colour255,bg=colour238] %H:%M %d-%b-%y #[default]'

# Window status styling
setw -g window-status-current-style 'fg=colour255 bg=colour24 bold'
setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-style 'fg=colour255 bg=colour238'
setw -g window-status-format ' #I:#W#F '

# Pane border styling
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour24'

# Message styling
set -g message-style 'fg=colour255 bg=colour24 bold'

# ============================================================================
# Clipboard Sharing Between Sessions
# ============================================================================

# All tmux sessions share the same paste buffer
# When you copy in one session/window/pane, it's available in all others
# This is enabled by default in tmux, but we ensure it's set
set -g set-clipboard on

# ============================================================================
# Additional Useful Settings
# ============================================================================

# Don't wait for escape sequences (faster command execution)
set -sg escape-time 0

# Allow automatic renaming of windows
set -g allow-rename on

# Monitor activity in other windows
setw -g monitor-activity on
set -g visual-activity off
